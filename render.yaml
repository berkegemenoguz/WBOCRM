services:
  # Backend API (Node.js)
  - type: web
    name: wbocrm-backend
    env: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wbocrm-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000

  # Frontend (Static Site via Vite)
  - type: web
    name: wbocrm-frontend
    env: static
    region: frankfurt
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://wbocrm-backend.onrender.com/api

databases:
  - name: wbocrm-db
    databaseName: wbocrm
    user: wbocrm_user
    region: frankfurt
    plan: free
